# 禁止事項・安全ルール

# =============================
# グローバル禁止事項（全タスク共通）
# =============================
global:
  forbidden_actions:
    - description: "記事・投稿の削除は禁止"
      keywords:
        - "削除"
        - "delete"
        - "remove"
        - "消す"
      message: "削除操作はこのツールではできません。手動で行ってください。"

    - description: "アカウント設定の変更禁止"
      keywords:
        - "システム設定"
        - "system settings"
        - "プロフィール設定"
      urls_blocked:
        - "*/settings*"
        - "*/admin*"
      message: "アカウント設定の変更は禁止されています。"

    - description: "決済・課金関連の操作禁止"
      keywords:
        - "決済"
        - "課金"
        - "payment"
        - "billing"
        - "サブスクリプション"
      message: "決済・課金に関する操作はこのツールではできません。"

    - description: "ログアウト操作禁止"
      keywords:
        - "ログアウト"
        - "logout"
        - "sign out"
        - "サインアウト"
      urls_blocked:
        - "*/logout*"
        - "*/sign_out*"
      message: "ログアウト操作は禁止されています。セッションを維持してください。"

  # 認証情報の安全な取り扱い
  credential_safety:
    rules:
      - "エージェントはログインを自動で行う"
      - "認証情報はブラウザのセッション・Cookie、または環境変数から取得する"
      - "認証情報をファイル（sites.yaml、ナレッジ等）に平文で保存しない"
      - "認証エラー時は最大2回リトライし、それでも失敗したらユーザーに報告する"

  # 安全装置
  safety:
    require_confirmation_before:
      - "公開"
      - "publish"
      - "投稿"
      - "post"
      - "一括"
      - "batch"
    max_steps_per_task: 20

# =============================
# タスク別オーバーライド
# =============================
# =============================
# コンテンツポリシー
# =============================
content:
  # ファクトチェック必須の情報カテゴリ
  fact_check_required:
    - "AIモデルの機能・性能"
    - "料金・プラン情報"
    - "比較情報"
    - "ニュース・トレンド"
    - "統計・数値データ"

  # ファクトチェック手順
  fact_check_flow:
    - "事実情報の箇所を抽出"
    - "一次ソース（公式ドキュメント・GitHub・リリースノート）で確認"
    - "確認不可 → 留保表現（〜と言われている / 執筆時点では）に変更 or 削除"
    - "掛け合い内の嘘 → ツッコミとセットになっているか確認"

  # トーン禁止事項
  tone_ng:
    - "煽り・攻撃的な表現"
    - "特定企業・個人への直接的な批判"
    - "AIに仕事を奪われる系の恐怖煽り"
    - "過度な専門用語の羅列（ガチ回でも平易な導入を付ける）"
    - "キャラの口調が concept.md から逸脱している"

  # 訂正ポリシー
  correction:
    x: "引用RTで訂正 + 元投稿にリプライで訂正注記"
    note: "記事冒頭に訂正注記 + 該当箇所を修正"

# =============================
# タスク別オーバーライド
# =============================
task_overrides:
  # 例: 特定タスクで max_steps を変更する場合
  # note-article-publish:
  #   safety:
  #     max_steps_per_task: 30

# --- ダッシュボード設定 ---
dashboard:
  output_dir: "knowledge/logs/dashboard"  # 統合ダッシュボードの出力先
  theme: "dark"
  chart_cdn: "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
  # タブ構成: [統合] [X] [note] [Instagram] ...
  # 統合タブ: Summary / Competitive / Trend Watch / Algorithm / System
  # 各PFタブ: Post Analysis（PF固有の指標・分析軸）
  integrated_sections:         # 統合タブのセクション
    - id: summary
      name: "Summary"
      enabled: true
    - id: competitive
      name: "Competitive"
      enabled: true
    - id: trend_watch
      name: "Trend Watch"
      enabled: true
    - id: algorithm
      name: "Algorithm"
      enabled: true
    - id: system
      name: "System"
      enabled: true
  platform_sections:           # 各PFタブのセクション
    - id: post_analysis
      name: "Post Analysis"
      enabled: true

# --- アルゴリズム監視設定 ---
algorithm_monitor:
  baseline_window_weeks: 12
  anomaly_threshold_sigma: 2.0

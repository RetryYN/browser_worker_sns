summary: "1. 検索結果の概要  \nX（旧Twitter）での検索では、AI（特にChatGPTや生成AI）に関する過度な驚きや煽り投稿をする「AI信者」やインフルエンサーを「胡散臭い」「カルト的」と批判する意見が主にヒットしました。AI礼賛派に対する懐疑・反発が中心で、AIアンチの行動も揶揄する投稿も一部見られます。投稿数は限定的ですが、2024〜2026年のものが散見され、議論が継続中です。[[1]](https://x.com/i/status/2018535431751733404)[[2]](https://x.com/i/status/1885652162371531251)\n\
  \n2. 主要な投稿・意見（URL付きで最大5件）  \n- **投稿1**: 生成AI系インフルエンサーに紹介された反AIポストを胡散臭いと指摘し、煽りタイプを無視せよと警告。（@gin_camp）\
  \  \n  URL: https://x.com/gin_camp/status/2018535431751733404[[1]](https://x.com/i/status/2018535431751733404)\
  \  \n- **投稿2**: AIインフルエンサーの信者を「カルト」と批判。AIで世界が変わると言いながら詐欺や治安悪化を招いていると指摘。（@r18rensyu）\
  \  \n  URL: https://x.com/r18rensyu/status/1885652162371531251[[2]](https://x.com/i/status/1885652162371531251)\
  \  \n- **投稿3**: 反AI垢がAI信者になりすまして嫌がらせをするのを「キツすぎる」と非難。（@a0625183882646）  \n  URL:\
  \ https://x.com/a0625183882646/status/1839106014823723058[[3]](https://x.com/i/status/1839106014823723058)\
  \  \n- **投稿4**: AI信者の主張を「頭シンギュラリティー」と呼び、AGIを神とする宗教的思考だと断じる。（@XSft294hO480406）  \n\

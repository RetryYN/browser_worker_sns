  \ Codeの非開発業務活用事例（Qiita記事紹介）。事務・営業の実務で手触り感ある事例が役立つと評価。https://x.com/usutaku_channel/status/2028723879171207354\
  \ [[4]](https://x.com/i/status/2028723879171207354)  \n- @ChatgptAIskill: NotebookLMで営業提案スライド作成プロンプト公開。デザイン指示を入れるコツで初心者でもプロ級資料が作れる。https://x.com/ChatgptAIskill/status/2033288381439131882\

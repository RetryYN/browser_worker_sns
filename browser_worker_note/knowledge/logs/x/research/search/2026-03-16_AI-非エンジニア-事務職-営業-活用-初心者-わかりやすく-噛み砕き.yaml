  \ [[3]](https://x.com/i/status/1872034688883474652)\n\n3. 全体的な傾向やセンチメント  \n傾向: Claude\
  \ Codeが非エンジニアの「業務組み込みツール」として人気で、Excel/PPT/Wordの自動生成や市場調査が頻出。初心者向けにプロンプト共有や講座が増加。センチメント:\
  \ 非常にポジティブ。「プログラミング不要」「業務革命」「即戦力」との声が多く、効率化の喜びが共有。注意点として「人間の最終チェック必須」との現実的な意見も。[[6]](https://x.com/i/status/2032245259766300978)\n\

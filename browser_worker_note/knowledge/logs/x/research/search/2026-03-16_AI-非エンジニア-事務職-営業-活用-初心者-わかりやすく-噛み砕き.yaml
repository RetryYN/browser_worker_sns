summary: "1. 検索結果の概要  \nX（旧Twitter）上で、非エンジニアの事務職・営業職向けにAI（主にClaude Code、NotebookLM、ChatGPTなど）を初心者でもわかりやすく活用する方法が活発に共有されています。営業提案資料の自動作成、Excel自動化、議事録生成などの実務事例が多く、プログラミング知識不要で「日本語指示のみ」で業務効率化が可能という内容が中心。講座告知やプロンプト共有も目立ち、2026年3月頃の最新投稿がヒットしました。[[1]](https://x.com/i/status/2029456174295466139)[[2]](https://x.com/i/status/2030657840789291430)[[3]](https://x.com/i/status/1872034688883474652)\n\

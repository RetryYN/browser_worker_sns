summary: "1. 検索結果の概要  \nX（旧Twitter）上で、AI（主にChatGPT、NotebookLM、Gemini）の活用法、特にプロンプトテンプレートの「まとめました」「保存版」「永久保存版」スレッドが多数ヒット。初心者向け基本テクから上級裏技、画像生成・スライド作成などの実践例がリスト形式で共有されており、エンゲージメントの高い投稿が集中。[[1]](https://x.com/i/status/2005398370207293939)[[2]](https://x.com/i/status/2016073717668049325)\n\
  \n2. 主要な投稿・意見（URL付きで最大5件）  \n- 【保存推奨】NotebookLMでインフォグラフィック生成のプロンプト比較（AI感なしの工夫例）。Likes:812\
  \ https://x.com/ChatgptAIskill/status/2021524633108009186[[3]](https://x.com/i/status/2021524633108009186)\
  \  \n- 【保存推奨】Google公式PTCFフレームワークのGeminiプロンプト5選（前提確認・形式固定など）。Likes:629 https://x.com/ChatgptAIskill/status/2012102603832963355[[4]](https://x.com/i/status/2012102603832963355)\
  \  \n- 【保存推奨】Googleガイドに基づく画像生成プロンプト20選（カメラ・ライティングなど）。Likes:713 https://x.com/ChatgptAIskill/status/1997969417897189392[[5]](https://x.com/i/status/1997969417897189392)\
  \  \n- 【保存推奨】NotebookLMの用途別プロンプト15選（ビジネス・デザインなど）。Likes:213 https://x.com/ChatgptAIskill/status/2022596689123774632[[6]](https://x.com/i/status/2022596689123774632)\
  \  \n- NotebookLM神プロンプト200個集（資料要約・議事録提案書化）。Likes:576 https://x.com/ai_jitan/status/1982193839755440504[[7]](https://x.com/i/status/1982193839755440504)\n\
  \n3. 全体的な傾向やセンチメント  \n傾向：リスト形式の「コピペ可能」プロンプトまとめが主流で、「保存推奨」「永久保存版」とのキーワードが頻出。@ChatgptAIskillのアカウントが圧倒的に多く、役割付与・形式指定・ステップ思考などの定番テクが中心。センチメントは非常にポジティブで、「即実践」「クオリティ10倍」「初心者必見」と実用性を強調。Latest検索では日常業務活用の散発投稿も見られるが、Topはまとめスレッド中心。[[8]](https://x.com/i/status/2018263132922405186)\n\
  \n4. コンテンツに活かせるポイント  \n- プロンプトの基本構造（役割・タスク・コンテキスト・形式：PTCF）を活用し、出力の再現性を高める。[[4]](https://x.com/i/status/2012102603832963355)\
  \  \n- デザイン指定（手描き風・色指定）でAI生成物の「AI感」を排除し、自然なビジュアルを作成。[[3]](https://x.com/i/status/2021524633108009186)\
  \  \n- 逆質問・自己検品を組み込み、初回から高精度な結果を得るテンプレ化。[[9]](https://x.com/i/status/2003301812871528635)\
  \  \nこれらを自身の業務（議事録・スライド・画像）にカスタム適用可能。"

  \n3. 全体的な傾向やセンチメント  \n投稿の多くがAI（特にChatGPT）を用いた副業成功事例や無料ツール/ガイドのプレゼント企画で、月収数万〜数百万の稼ぎを強調。エンゲージメントを高める「フォロー・いいね・RT・リプ」条件が共通で、プロモーション色が強い。センチメントは非常にポジティブ（「簡単」「半自動」「人生変わる」）だが、誇張や営業臭が目立ち、信頼性に疑問符がつくものも。初心者向け再現性を売りにしたものが主流。[[7]](https://x.com/i/status/2032426972689948829)[[8]](https://x.com/i/status/1920644680423010635)\n\

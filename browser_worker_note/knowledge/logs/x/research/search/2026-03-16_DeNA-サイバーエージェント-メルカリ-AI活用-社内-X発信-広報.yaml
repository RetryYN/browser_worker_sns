  \ [[1]](https://x.com/i/status/2003447719789244782)  \n- DeNAの社内AI活用レベルを5段階で評価する仕組みを公開。個人・社内目標設定の参考に。<br>https://x.com/masahirochaen/status/2010500982380404852\

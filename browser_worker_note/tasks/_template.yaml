# タスク定義テンプレート
# /create-task で新しいタスクを作成する際のひな形

name: your-task-name
description: タスクの概要をここに書く

# config/sites.yaml で定義したサイトのキー名
site: note

# パラメータ: 実行時にユーザーが指定する変動値
params:
  - name: param_name
    description: パラメータの説明
    required: true
    example: "例の値"

# ステップ: 上から順番に実行される
steps:
  # URL遷移
  - action: navigate
    description: "対象ページにアクセスする"
    url: "https://note.com/dashboard"

  # ログイン
  - action: login
    description: "ログインする"
    site: "{{site}}"

  # ブラウザ操作
  - action: interact
    description: |
      以下の操作を行う:
      1. 操作手順を自然言語で記述
      2. {{param_name}} のように変数を埋め込める

  # AI文章生成
  - action: generate_text
    description: "文章を生成する"
    instruction: "どんな文章を生成するかの指示"
    skill: god-writing

  # 組織的監査（多角レビュー）
  # - action: committee_review
  #   description: "生成した文章を組織的視点で段階的に監査する"
  #   target_text: "{{prev_result}}"
  #   skill: god-writing
  #   review_pipeline:
  #     upstream:
  #       - role: Editor
  #       - role: Marketer
  #     downstream:
  #       - role: Editor
  #       - role: Writer
  #     executor: CEO

  # 画像生成（必要な場合）
  - action: generate_image
    when: "{{param_name}}"
    description: "必要なら画像を生成する"
    type: thumbnail
    prompt: "{{param_name}} を説明するサムネイル"
    topic: "{{param_name}}"
    skill: image-generation

  # 画像アップロード
  - action: upload_image
    when: "{{param_name}}"
    description: "生成済み画像をそのままアップロードする"
    file_path: "{{prev_result}}"

  # コマンド実行（ログ保存・集計など）
  - action: command
    description: "必要ならローカルコマンドを実行する"
    command: |
      Write-Output "example"

  # 結果確認
  - action: verify
    description: "結果を確認してスクリーンショットを撮る"

# エラー時の対応
on_error: "スクリーンショットを撮って状況を報告する"

# 補足:
# - すべての文字列フィールドで {{site}}, {{param_name}}, {{prev_result}}, {{step_results[N]}} を使える
# - when を付けると、空文字 / false / 0 / none / null / skip のときそのステップをスキップできる
# - upload_image は file_path が空なら自動でスキップされる
# - 投稿レイヤーでは画像加工を行わず、生成レイヤーが出したファイルをそのまま添付する
# - command はログ保存や補助スクリプト起動に使える

# note 記事公開タスク
# /run-task note-article-publish テーマ: AIエージェントの現在地

name: note-article-publish
description: noteに新しい記事を作成して公開する

site: note

params:
  - name: theme
    description: 記事のテーマ・主題
    required: true
    example: "AIエージェントの現在地"
  - name: tags
    description: 記事に付けるタグ（カンマ区切り）
    required: false
    example: "AI, エージェント, テクノロジー"
  - name: source_url
    description: 一次ソースURLや主たる参照元URL
    required: false
    example: "https://openai.com/blog/example"
  - name: draft_path
    description: "校正済み下書きファイルのパス（指定時は generate_text をスキップし、下書きから本文を読み込む）"
    required: false
    example: "knowledge/drafts/note_chatgpt-history.md"
  - name: content_type
    description: "content-types の推奨構成（例: C3 × P4 × T7）"
    required: false
    example: "C3 × P4 × T7"
  - name: topic_main
    description: メイントピック
    required: false
    example: "Claude"
  - name: topic_sub
    description: サブトピック（カンマ区切り）
    required: false
    example: "AIニュース, Claude Code"
  - name: research_brief
    description: リサーチで整理した要点メモ
    required: false
    example: "新機能の核心、読者価値、実演可否、注意点"
  - name: verification_log
    description: 検証ログのパス
    required: false
    example: "knowledge/logs/research/2026-03-12.md"
  - name: thumbnail_path
    description: 記事に添付するローカルのサムネイル画像パス
    required: false
    example: "knowledge/data/images/note_thumbnail_ai-agent_2026-03-12.jpg"

steps:
  # ダッシュボードにアクセス
  - action: navigate
    description: "noteのダッシュボードにアクセスする"
    url: "https://note.com/sitesettings/stats"

  # ログイン確認
  - action: login
    description: "ログイン状態を確認し、未ログインなら自動ログインする"
    site: "{{site}}"

  # 記事作成画面に遷移
  - action: interact
    description: |
      新規記事作成ボタンをクリックしてエディタ画面に遷移する

  # 記事本文の取得（下書きファースト）
  #
  # draft_path が指定されている場合:
  #   → 校正済み下書きファイルを読み込み、TITLE / LEAD / BODY / CTA / TAGS を抽出する
  #   → generate_text と committee_review はスキップする
  #
  # draft_path が未指定の場合:
  #   → /generate-content ワークフローで下書きを作成・校正してから再実行することを推奨
  #   → フォールバックとして従来の generate_text → committee_review を実行する
  #
  - action: load_draft
    description: |
      {{draft_path}} が指定されている場合:
      1. 下書きファイルを Read で読み込む
      2. ステータスが「校正済み」であることを確認（未校正なら中断）
      3. フロントマター + 本文から TITLE / LEAD / BODY / CTA / TAGS / 画像マニフェストを抽出
      4. 画像マニフェストのファイルが実在するか確認
      {{draft_path}} が未指定の場合はスキップし、次の generate_text ステップに進む
    when: "{{draft_path}}"

  - action: generate_text
    description: "（フォールバック）{{theme}} をテーマに、note向けの長文記事ドラフトを生成する"
    when_not: "{{draft_path}}"
    instruction: |
      テーマ「{{theme}}」について、note向けの長文記事ドラフトを作成する。
      読者は「AIを仕事に活かしたい実務者」を想定する。
      利用可能な前提情報:
      - 一次ソース: {{source_url}}
      - 推奨構成: {{content_type}}
      - メイントピック: {{topic_main}}
      - サブトピック: {{topic_sub}}
      - 調査メモ: {{research_brief}}
      - 検証ログ: {{verification_log}}
      出力は必ず以下の構造を守ること。

      TITLE: 32文字以内のタイトル
      LEAD:
      2-3文の導入

      BODY:
      ## 見出し
      本文

      ## 見出し
      本文

      CTA:
      次のアクションにつながる締めの一文

      TAGS:
      タグ候補をカンマ区切りで3-5個

      要件:
      - noteにそのまま貼り込める自然な日本語
      - 導入は短く、本文は具体例と実務の示唆を含める
      - 一次ソースや検証ログが渡されている場合は、それを優先して内容を構成する
      - AIモデル名や数値を出す場合は断定しすぎず、根拠が曖昧なら留保表現にする
    skill: god-writing

  # 組織的監査（フォールバック時のみ）
  - action: committee_review
    description: "生成した記事を組織的視点で段階的に監査する"
    when_not: "{{draft_path}}"
    target_text: "{{prev_result}}"
    skill: god-writing
    review_pipeline:
      upstream:
        - role: Editor
        - role: Marketer
      downstream:
        - role: Editor
        - role: Writer
      executor: CEO

  # サムネイル画像アップロード（任意）
  - action: interact
    description: |
      {{thumbnail_path}} が指定されている場合のみ:
      1. 「画像を追加」ボタンをクリック
      2. ファイルチューザーが開く → browser_file_upload で {{thumbnail_path}} を指定
    when: "{{thumbnail_path}}"

  # タイトル入力
  - action: interact
    description: |
      直前の generate_text/committee_review 最終稿から TITLE を読み取り:
      1. 「記事タイトル」テキストボックスをクリック
      2. browser_type でタイトルを入力

  # 本文入力
  - action: interact
    description: |
      最終稿から LEAD / BODY / CTA を読み取り、browser_evaluate でDOM一括操作:
      1. ProseMirror エディタを取得: document.querySelector('.ProseMirror')
      2. 見出し（h2/h3）、段落(p)、リスト(ul/ol)をHTML文字列で構築
      3. エディタのinnerHTMLに挿入
      4. dispatchEvent(new Event('input', { bubbles: true })) で変更を通知
      ※ browser_type の繰り返しよりDOM一括操作が効率的

  # 画像挿入（記事内の図解・スクリーンショット等）
  - action: interact
    description: |
      記事内に挿入する画像がある場合:
      1. 挿入位置の空段落をクリック
      2. 「メニューを開く」(+ボタン)をクリック
      3. 「画像」をクリック
      4. ファイルチューザーが開く → browser_file_upload で絶対パスを指定
      ※ 複数画像は挿入位置ごとに繰り返す

  # テキスト装飾（太字等）
  - action: interact
    description: |
      browser_evaluate でProseMirrorのDOM操作:
      1. 太字対象テキストをリストアップ
      2. innerHTML.replace で <strong> タグを追加
      3. dispatchEvent(new Event('input', { bubbles: true }))

  # 目次挿入
  - action: interact
    description: |
      見出し確定後に目次を挿入:
      1. リード直後の空段落をクリック
      2. 「メニューを開く」→「目次」をクリック
      ※ H2/H3から自動生成される

  # 公開設定に進む
  - action: interact
    description: |
      「公開に進む」ボタンをクリック → editor.note.com/notes/<id>/publish/ に遷移

  # ハッシュタグ設定
  - action: interact
    description: |
      combobox「ハッシュタグを追加する」に以下の手順で追加:
      1. combobox に slowly: true でタグ名を入力（#なし）
      2. ドロップダウンから候補をクリック
      3. 次のタグも同様に繰り返す
      {{tags}} が指定されていればそれを使い、未指定なら TAGS を入力する

  # 記事タイプ・マガジン・詳細設定確認
  - action: verify
    description: |
      公開設定画面で以下を確認・スクリーンショット:
      - 記事タイプ: 無料（デフォルト）
      - マガジン追加状態
      - クリエイターページに表示: ON
      - AI学習対価還元: ON
      - コメント受付: ON

  # 公開（ユーザー最終承認）
  - action: interact
    description: |
      ユーザーに公開設定のサマリーを提示し、最終承認を取る。
      承認後に「投稿する」ボタンをクリック。

  # スキ設定（投稿直後に遷移）
  - action: interact
    description: |
      スキ設定画面（/like_reaction_setting）に自動遷移する。
      スキ画像を設定する場合:
      1. 「画像をアップロード」の親要素をクリック
      2. ファイルチューザー → browser_file_upload
      3. 「これで設定！」をクリック
      設定しない場合は「スキップ」をクリック。

  # 公開後確認
  - action: verify
    description: |
      公開された記事ページ（https://note.com/akatu_unison/n/<記事ID>）にアクセスし:
      1. snapshot で記事構成を確認（タイトル、見出し、画像、ハッシュタグ）
      2. スクリーンショットを撮る

on_error: "スクリーンショットを撮って状況を報告する"
